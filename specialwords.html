<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💌 Special Words 💌</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe6f0,#fff0f5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:85%;
    max-width:1000px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.memory-section{
    display:flex;
    align-items:center;
    gap:30px;
}

.memory-photo{
    width:250px;
    height:320px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.memory-text{
    flex:1;
}

.memory-text h1{
    color:#ff4081;
    margin-bottom:20px;
}

.memory-text p{
    font-size:18px;
    line-height:1.8;
    color:#444;
}

.navigation{
    margin-top:40px;
    display:flex;
    justify-content:space-between;
}

.navigation button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.navigation button:hover{
    transform:scale(1.05);
}

</style>
</head>
<audio id="bgMusic" loop>
    <source src="song2.mp3" type="audio/mpeg">
</audio>

<script>
const bgMusic = document.getElementById("bgMusic");

window.addEventListener("load", () => {
    const savedTime = localStorage.getItem("musicTime");

    if (savedTime) {
        bgMusic.currentTime = parseFloat(savedTime);
    }

    bgMusic.play().catch(() => {});
});

setInterval(() => {
    localStorage.setItem("musicTime", bgMusic.currentTime);
}, 500);

window.addEventListener("beforeunload", () => {
    localStorage.setItem("musicTime", bgMusic.currentTime);
});
</script>
<body>

<div class="container">

    <div class="memory-section">

        <img src="photo15.jpg"
             class="memory-photo"
             alt="Special Words">

        <div class="memory-text">

            <h1>💌 Special Words 💌</h1>

            <p>
                Thank you for every encouraging word,
                every piece of advice, and every moment
                you stood by my side.
            </p>

            <br>

            <p>
                Your kindness and support have always
                inspired me, reminding me how lucky
                I am to have a friend like you.
                These special words and memories
                will always remain close to my heart.
            </p>

        </div>

    </div>

    <div class="navigation">

        <button onclick="previousPage()">
            ⬅ Previous
        </button>

        <button onclick="nextPage()">
            Next ➡
        </button>

    </div>

</div>

<script>

function previousPage(){
    window.location.href="journey.html";
}

function nextPage(){
    window.location.href="bond.html";
}

</script>

</body>
</html>
