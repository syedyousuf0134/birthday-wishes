<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤝 Bond 🤝</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fef6e4,#ffe6f0);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:85%;
    max-width:1100px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.memory-section{
    display:flex;
    align-items:flex-start;
    gap:30px;
}

.photo-column{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.memory-photo{
    width:250px;
    height:320px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.memory-text{
    flex:1;
}

.memory-text h1{
    color:#ff4081;
    margin-bottom:20px;
}

.memory-text p{
    font-size:18px;
    line-height:1.8;
    color:#444;
}

.navigation{
    margin-top:40px;
    display:flex;
    justify-content:space-between;
}

.navigation button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.navigation button:hover{
    transform:scale(1.05);
}

</style>
</head>
<audio id="bgMusic" loop>
    <source src="song2.mp3" type="audio/mpeg">
</audio>

<script>
const bgMusic = document.getElementById("bgMusic");

window.addEventListener("load", () => {
    const savedTime = localStorage.getItem("musicTime");

    if (savedTime) {
        bgMusic.currentTime = parseFloat(savedTime);
    }

    bgMusic.play().catch(() => {});
});

setInterval(() => {
    localStorage.setItem("musicTime", bgMusic.currentTime);
}, 500);

window.addEventListener("beforeunload", () => {
    localStorage.setItem("musicTime", bgMusic.currentTime);
});
</script>

<body>

<div class="container">

    <div class="memory-section">

        <div class="photo-column">

            <img src="hoto6.jpg"
                 class="memory-photo"
                 alt="Bond Photo 1">


        </div>

        <div class="memory-text">

            <h1>🤝 Bond 🤝</h1>

            <p>
                Four years may seem short to others,
                but they were enough to create a bond
                that feels like brotherhood.
            </p>

            <br>

            <p>
                Through happiness and challenges,
                our friendship has become one of
                the most valuable blessings and
                memories in my life. This bond
                will always remain strong and
                unforgettable.
            </p>

        </div>

    </div>

    <div class="navigation">

        <button onclick="previousPage()">
            ⬅ Previous
        </button>

        <button onclick="nextPage()">
            Next ➡
        </button>

    </div>

</div>

<script>

function previousPage(){
    window.location.href="specialwords.html";
}

function nextPage(){
    window.location.href="memories.html";
}

</script>

</body>
</html>
